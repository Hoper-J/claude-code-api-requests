<!-- @dsCard group="Components" viewport="700x280" name="Navigation — tabs & segments" subtitle="Tabs · SegmentedControl (locale / theme / mode)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../public/styles.css">
<style>
  body { margin:0; background: var(--bg-app); padding: 26px 30px; }
  .sec { margin-bottom: 22px; }
  .sec:last-child { margin-bottom: 0; }
  .lbl { font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; letter-spacing: var(--track-over); font-weight: 600; color: var(--text-faint); margin-bottom: 11px; }
  .rowf { display:flex; flex-wrap:wrap; align-items:center; gap: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="react" src="../../../public/kit-lib.jsx"></script>
  <script type="text/babel" data-presets="react">
    function I({ d }) { return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>; }
    const sun = <I d={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></>} />;
    const moon = <I d={<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>} />;

    function Demo() {
      const [tab, setTab] = React.useState('tools');
      const [loc, setLoc] = React.useState('en');
      const [theme, setTheme] = React.useState('light');
      const [mode, setMode] = React.useState('unified');
      return (
        <div>
          <div className="sec">
            <div className="lbl">Tabs</div>
            <Tabs items={[
              { id:'system', label:'System prompt' },
              { id:'tools', label:'Tools', count: 15 },
              { id:'meta', label:'Metadata' },
            ]} value={tab} onChange={setTab} />
          </div>
          <div className="sec">
            <div className="lbl">SegmentedControl</div>
            <div className="rowf">
              <SegmentedControl options={[{value:'en',label:'EN'},{value:'zh',label:'中文'}]} value={loc} onChange={setLoc} />
              <SegmentedControl size="sm" options={[{value:'light',icon:sun,title:'Light'},{value:'dark',icon:moon,title:'Dark'}]} value={theme} onChange={setTheme} />
              <SegmentedControl options={[{value:'unified',label:'Unified'},{value:'split',label:'Split'}]} value={mode} onChange={setMode} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
