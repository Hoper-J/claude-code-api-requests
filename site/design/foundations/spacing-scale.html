<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4px grid · space-1 → space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../public/styles.css">
<style>
  body { padding: 24px 28px; background: var(--bg-app); }
  .row { display: grid; grid-template-columns: 86px 1fr; align-items: center; gap: 14px; padding: 5px 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .tag b { color: var(--text-strong); font-weight: 600; }
  .bar { height: 14px; background: var(--brand); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="tag"><b>1</b> · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag"><b>2</b> · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag"><b>3</b> · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag"><b>4</b> · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag"><b>6</b> · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag"><b>8</b> · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag"><b>12</b> · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag"><b>16</b> · 64</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
