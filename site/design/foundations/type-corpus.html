<!-- @dsCard group="Type" viewport="700x300" name="Corpus — JetBrains Mono" subtitle="The verbatim payload — never translated" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../public/styles.css">
<style>
  body { padding: 26px 32px; background: var(--bg-app); }
  .well { background: var(--surface-well); border: 1px solid var(--line-hairline); border-radius: var(--radius-3); box-shadow: var(--shadow-inset); padding: 16px 18px; font-family: var(--font-mono); font-size: var(--t-code); line-height: var(--lh-code); color: var(--text-body); white-space: pre; overflow-x: auto; }
  .k { color: var(--brand); }
  .s { color: var(--add-text); }
  .tag { color: var(--text-faint); }
  .meta { display:flex; gap:18px; margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
  .meta b { color: var(--text-muted); font-weight:600; }
</style>
</head>
<body>
  <div class="well">{
  <span class="k">"name"</span>: <span class="s">"Bash"</span>,
  <span class="k">"description"</span>: <span class="s">"Executes a given bash command…"</span>,
  <span class="k">"input_schema"</span>: { <span class="tag">"type"</span>: <span class="s">"object"</span> }
}</div>
  <div class="meta"><span><b>13px</b> code</span><span><b>12px</b> dense schema</span><span><b>liga</b> off · <b>calt</b> on</span></div>
</body>
</html>
