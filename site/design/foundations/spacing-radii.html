<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & elevation" subtitle="Low, crisp radii · near-flat warm shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../public/styles.css">
<style>
  body { padding: 26px 28px; background: var(--bg-app); display:flex; gap: 34px; align-items: flex-start; }
  .group { display:flex; gap: 16px; }
  .item { text-align: center; }
  .box { width: 60px; height: 52px; background: var(--surface-card); border: 1px solid var(--line-hairline); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; }
  .lab b { display:block; color: var(--text-strong); font-weight:600; }
  .sep { width:1px; align-self: stretch; background: var(--line-hairline); }
</style>
</head>
<body>
  <div class="group">
    <div class="item"><div class="box" style="border-radius:var(--radius-1)"></div><div class="lab"><b>r1</b>3px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2)"></div><div class="lab"><b>r2</b>5px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-3)"></div><div class="lab"><b>r3</b>8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-4)"></div><div class="lab"><b>r4</b>12px</div></div>
  </div>
  <div class="sep"></div>
  <div class="group">
    <div class="item"><div class="box" style="border-radius:var(--radius-3); box-shadow:var(--shadow-sm); border-color:transparent"></div><div class="lab"><b>sm</b>menu</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-3); box-shadow:var(--shadow-md); border-color:transparent"></div><div class="lab"><b>md</b>popover</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-4); box-shadow:var(--shadow-pop); border-color:transparent"></div><div class="lab"><b>pop</b>dialog</div></div>
  </div>
</body>
</html>
