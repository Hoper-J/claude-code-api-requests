<!-- @dsCard group="Brand" viewport="700x220" name="Logo & mark" subtitle="Version-graph glyph + wordmark, on paper and ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../public/styles.css">
<style>
  body { padding: 0; background: var(--bg-app); display: grid; grid-template-columns: 1fr 1fr; }
  .tile { display:flex; align-items:center; gap:18px; padding: 40px 36px; }
  .light { background: var(--paper-50); color: var(--ink-900); }
  .dark  { background: oklch(0.205 0.009 66); color: oklch(0.955 0.008 84); }
  .lock { display:flex; align-items:center; gap:13px; }
  .word { font-family: var(--font-editorial); font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
  svg { display:block; }
</style>
</head>
<body>
  <div class="tile light">
    <div class="lock">
      <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
        <line x1="9" y1="4.5" x2="9" y2="27.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M9 16 C 9 21, 14 20, 23 20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <circle cx="9" cy="6.5" r="3.4" fill="var(--paper-50)" stroke="currentColor" stroke-width="2.2"/>
        <circle cx="9" cy="25.5" r="3.4" fill="var(--paper-50)" stroke="currentColor" stroke-width="2.2"/>
        <circle cx="24.5" cy="20" r="3.4" fill="currentColor"/>
      </svg>
      <span class="word">Lineage</span>
    </div>
  </div>
  <div class="tile dark">
    <div class="lock">
      <svg width="34" height="34" viewBox="0 0 32 32" fill="none">
        <line x1="9" y1="4.5" x2="9" y2="27.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M9 16 C 9 21, 14 20, 23 20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <circle cx="9" cy="6.5" r="3.4" fill="oklch(0.205 0.009 66)" stroke="currentColor" stroke-width="2.2"/>
        <circle cx="9" cy="25.5" r="3.4" fill="oklch(0.205 0.009 66)" stroke="currentColor" stroke-width="2.2"/>
        <circle cx="24.5" cy="20" r="3.4" fill="currentColor"/>
      </svg>
      <span class="word">Lineage</span>
    </div>
  </div>
</body>
</html>
